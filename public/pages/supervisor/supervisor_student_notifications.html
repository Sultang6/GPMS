    <script>
      (function () {
        function gpmsPublicBase() {
          if (location.protocol === "file:") {
            var u = location.href.split("#")[0].split("?")[0];
            var i = u.toLowerCase().indexOf("/pages/");
            if (i >= 0) return u.slice(0, i + 1);
            return u.slice(0, u.lastIndexOf("/") + 1);
          }
          var p = location.pathname.replace(/\\/g, "/");
          var idx = p.indexOf("/pages/");
          if (idx >= 0) return p.slice(0, idx + 1);
          var slash = p.lastIndexOf("/");
          return slash >= 0 ? p.slice(0, slash + 1) : "/";
        }
        window.gpmsPublicBase = gpmsPublicBase;
        var base = document.createElement("base");
        base.href = gpmsPublicBase();
        document.head.appendChild(base);
      })();
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="js/gpms-page-i18n.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
      const API = window.GPMS_CONFIG?.apiBaseUrl || "http://localhost:8000/api/v1";
      const session = (() => { try { return JSON.parse(localStorage.getItem("gpms_session_v1")); } catch { return null; } })();
      const token = session?.accessToken || "";
      const userId = session?.userId;
      const authHeaders = { Authorization: `Bearer ${token}` };
      function esc(v) { return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

      const recipientSelect = document.getElementById("notifyRecipient");
      const titleInput = document.getElementById("notifyTitle");
      const contentInput = document.getElementById("notifyContent");
      const btnSend = document.getElementById("btnSendNotify");
      const statusDiv = document.getElementById("notifyStatus");
      const historyDiv = document.getElementById("notifyHistory");

      async function loadRecipients() {
        try {
          const res = await fetch(`${API}/projects?supervisor_id=${userId}`, { headers: authHeaders });
          if (!res.ok) return;
          const projects = await res.json();
          const list = Array.isArray(projects) ? projects : [];
          const studentSet = new Map();

          for (const p of list) {
            try {
              const stRes = await fetch(`${API}/projects/${p.project_id}/students`, { headers: authHeaders });
              if (stRes.ok) {
                const students = await stRes.json();
                (Array.isArray(students) ? students : []).forEach(st => {
                  if (!studentSet.has(st.id)) {
                    studentSet.set(st.id, st.full_name || st.email || `طالب #${st.id}`);
                  }
                });
              }
            } catch {}
          }

          studentSet.forEach((name, id) => {
            const opt = document.createElement("option");
            opt.value = id;
            opt.textContent = name;
            recipientSelect.appendChild(opt);
          });
        } catch (err) { console.error(err); }
      }

      async function loadHistory() {
        try {
          const res = await fetch(`${API}/notifications`, { headers: authHeaders });
          if (!res.ok) { historyDiv.innerHTML = '<div class="text-sm text-red-500">فشل تحميل السجل</div>'; return; }
          const notifs = await res.json();
          const list = Array.isArray(notifs) ? notifs : [];

          if (list.length === 0) {
            historyDiv.innerHTML = '<div class="text-sm text-slate-500">لا توجد إشعارات سابقة.</div>';
            return;
          }

          historyDiv.innerHTML = list.map(n => `
            <div class="rounded-xl border border-slate-200 bg-slate-50 p-4">
              <div class="flex items-center justify-between gap-2">
                <div class="text-sm font-extrabold text-slate-900">${esc(n.title || "إشعار")}</div>
                <span class="text-xs text-slate-500">${n.created_at ? new Date(n.created_at).toLocaleDateString("ar-SA") : ""}</span>
              </div>
              <p class="mt-2 text-sm text-slate-600">${esc(n.content || n.message || "")}</p>
            </div>
          `).join("");
        } catch (err) {
          console.error(err);
          historyDiv.innerHTML = '<div class="text-sm text-red-500">حدث خطأ في التحميل</div>';
        }
      }

      btnSend.addEventListener("click", async () => {
        const recipientId = recipientSelect.value;
        const title = titleInput.value.trim();
        const content = contentInput.value.trim();

        if (!recipientId) { alert("الرجاء اختيار المستلم"); return; }
        if (!title) { alert("الرجاء إدخال العنوان"); return; }
        if (!content) { alert("الرجاء إدخال نص الإشعار"); return; }

        btnSend.disabled = true;
        btnSend.textContent = "جاري الإرسال...";
        statusDiv.classList.add("hidden");

        try {
          const res = await fetch(`${API}/notifications`, {
            method: "POST",
            headers: { ...authHeaders, "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: parseInt(recipientId), title, content })
          });

          statusDiv.classList.remove("hidden", "bg-green-50", "text-green-700", "bg-red-50", "text-red-700");
          if (res.ok) {
            statusDiv.classList.add("bg-green-50", "text-green-700");
            statusDiv.textContent = "تم إرسال الإشعار بنجاح";
            titleInput.value = "";
            contentInput.value = "";
            recipientSelect.value = "";
            loadHistory();
          } else {
            const err = await res.json().catch(() => ({}));
            statusDiv.classList.add("bg-red-50", "text-red-700");
            statusDiv.textContent = "فشل الإرسال: " + (err.detail || res.statusText);
          }
        } catch (err) {
          statusDiv.classList.remove("hidden");
          statusDiv.classList.add("bg-red-50", "text-red-700");
          statusDiv.textContent = "خطأ في الاتصال بالخادم";
        } finally {
          btnSend.disabled = false;
          btnSend.textContent = "إرسال";
        }
      });

      loadRecipients();
      loadHistory();
    });
    </script>
