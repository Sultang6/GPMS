    <script>
      (function () {
        function gpmsPublicBase() {
          if (location.protocol === "file:") {
            var u = location.href.split("#")[0].split("?")[0];
            var i = u.toLowerCase().indexOf("/pages/");
            if (i >= 0) return u.slice(0, i + 1);
            return u.slice(0, u.lastIndexOf("/") + 1);
          }
          var p = location.pathname.replace(/\\/g, "/");
          var idx = p.indexOf("/pages/");
          if (idx >= 0) return p.slice(0, idx + 1);
          var slash = p.lastIndexOf("/");
          return slash >= 0 ? p.slice(0, slash + 1) : "/";
        }
        window.gpmsPublicBase = gpmsPublicBase;
        var base = document.createElement("base");
        base.href = gpmsPublicBase();
        document.head.appendChild(base);
      })();
    </script>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
      const API = window.GPMS_CONFIG?.apiBaseUrl || "http://localhost:8000/api/v1";
      const session = (() => { try { return JSON.parse(localStorage.getItem("gpms_session_v1")); } catch { return null; } })();
      const token = session?.accessToken || "";
      const authHeaders = { Authorization: `Bearer ${token}` };
      function esc(v) { return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

      if (!token) return;

      const container = document.getElementById("notificationsList");
      const markAllBtn = document.getElementById("markAllReadBtn");

      function timeAgo(dateStr) {
        if (!dateStr) return "";
        const diff = Date.now() - new Date(dateStr).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return "الآن";
        if (mins < 60) return `منذ ${mins} دقيقة`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return `منذ ${hrs} ساعة`;
        const days = Math.floor(hrs / 24);
        if (days < 30) return `منذ ${days} يوم`;
        return new Date(dateStr).toLocaleDateString("ar-SA");
      }

      function renderNotifications(items) {
        if (!items || items.length === 0) {
          container.innerHTML = '<div class="text-center text-sm text-slate-500 py-8">لا توجد إشعارات حالياً</div>';
          return;
        }
        container.innerHTML = items.map(n => {
          const unreadClass = n.is_read ? "bg-slate-50" : "bg-amber-50/60 border-amber-200";
          const dot = n.is_read ? "" : '<span class="inline-block h-2 w-2 rounded-full bg-gpms-maroon ml-2"></span>';
          return `<div class="rounded-xl border border-slate-200 ${unreadClass} p-4">
            <div class="flex items-center justify-between gap-2">
              <div class="text-sm font-extrabold text-slate-900">${dot}${esc(n.title || n.message || "إشعار")}</div>
              <span class="text-xs text-slate-500 whitespace-nowrap">${timeAgo(n.created_at)}</span>
            </div>
            <p class="mt-2 text-sm text-slate-600">${esc(n.content || n.body || "")}</p>
          </div>`;
        }).join("");
      }

      async function loadNotifications() {
        try {
          const resp = await fetch(`${API}/notifications`, { headers: authHeaders });
          if (!resp.ok) throw new Error();
          const data = await resp.json();
          const items = Array.isArray(data) ? data : (data.items || []);
          renderNotifications(items);
        } catch {
          container.innerHTML = '<div class="text-center text-sm text-red-500 py-8">تعذر تحميل الإشعارات</div>';
        }
      }

      if (markAllBtn) {
        markAllBtn.addEventListener("click", async () => {
          try {
            await fetch(`${API}/notifications/mark-all-read`, {
              method: "PATCH",
              headers: authHeaders
            });
            loadNotifications();
          } catch {
            alert("تعذر تحديث الإشعارات");
          }
        });
      }

      loadNotifications();
    });
    </script>
