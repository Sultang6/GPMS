<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script>
      (function () {
        function gpmsPublicBase() {
          if (location.protocol === "file:") {
            var u = location.href.split("#")[0].split("?")[0];
            var i = u.toLowerCase().indexOf("/pages/");
            if (i >= 0) return u.slice(0, i + 1);
            return u.slice(0, u.lastIndexOf("/") + 1);
          }
          var p = location.pathname.replace(/\\/g, "/");
          var idx = p.indexOf("/pages/");
          if (idx >= 0) return p.slice(0, idx + 1);
          var slash = p.lastIndexOf("/");
          return slash >= 0 ? p.slice(0, slash + 1) : "/";
        }
        window.gpmsPublicBase = gpmsPublicBase;
        var base = document.createElement("base");
        base.href = gpmsPublicBase();
        document.head.appendChild(base);
      })();
    </script>
        <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPMS | تغيير كلمة المرور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              tajawal: ["Tajawal", "system-ui", "Segoe UI", "Arial", "sans-serif"],
            },
            colors: {
              gpms: {
                maroon: "#7A2E2E",
                maroonDark: "#622424",
                charcoal: "#2F343C",
                bg: "#F4F5F7",
              },
            },
            boxShadow: {
              soft: "0 18px 60px rgba(15, 23, 42, .08)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/GPMS.css" />
  </head>
  <body class="min-h-dvh bg-gpms-bg font-tajawal text-slate-800" data-page="change-password">
    <main class="min-h-dvh px-4 py-10 sm:py-14">
      <div class="mx-auto flex min-h-[calc(100dvh-5rem)] max-w-lg items-center justify-center">
        <section class="w-full max-w-md">
          <div class="relative overflow-hidden rounded-2xl bg-white shadow-soft">
            <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-l from-gpms-maroon via-gpms-maroon to-gpms-maroonDark"></div>
            <div class="px-6 pb-6 pt-7 sm:px-8 sm:pb-8 sm:pt-8">
              <header class="text-center">
                <div class="mx-auto mb-3 flex h-11 w-11 items-center justify-center rounded-xl bg-gpms-maroon/10 text-gpms-maroon">
                  <i data-lucide="key-round" class="h-6 w-6"></i>
                </div>
                <h1 class="text-xl font-extrabold text-gpms-maroon sm:text-2xl" data-i18n="changePassword">تغيير كلمة المرور</h1>
                <p class="mt-1 text-sm text-slate-500" data-i18n="changePasswordHintFull">لأسباب أمنية، يجب تعيين كلمة مرور جديدة قبل المتابعة.</p>
              </header>

              <div class="mt-4">
                <label for="gpmsLangSelect" class="mb-2 block text-sm font-bold text-slate-700" data-i18n="language">اللغة</label>
                <select id="gpmsLangSelect" class="gpms-input w-full">
                  <option value="ar">العربية</option>
                  <option value="en">English</option>
                </select>
              </div>

              <form id="changePasswordForm" class="mt-6 space-y-4" novalidate>
                <div>
                  <label for="currentPassword" class="mb-2 block text-sm font-bold text-slate-700" data-i18n="currentPassword">كلمة المرور الحالية</label>
                  <input
                    id="currentPassword"
                    type="password"
                    autocomplete="current-password"
                    class="gpms-input w-full"
                    required
                  />
                </div>
                <div>
                  <label for="newPassword" class="mb-2 block text-sm font-bold text-slate-700">كلمة المرور الجديدة</label>
                  <input
                    id="newPassword"
                    type="password"
                    autocomplete="new-password"
                    minlength="6"
                    class="gpms-input w-full"
                    required
                  />
                  <p class="mt-1 text-xs text-slate-500">6 أحرف على الأقل.</p>
                </div>
                <div>
                  <label for="confirmPassword" class="mb-2 block text-sm font-bold text-slate-700">تأكيد كلمة المرور</label>
                  <input
                    id="confirmPassword"
                    type="password"
                    autocomplete="new-password"
                    class="gpms-input w-full"
                    required
                  />
                </div>
                <div
                  id="cpAlert"
                  class="hidden rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-bold text-red-700"
                  role="alert"
                ></div>
                <button type="submit" id="cpSubmit" class="gpms-button w-full py-3">حفظ ومتابعة</button>
              </form>
            </div>
          </div>
          <p class="mt-4 text-center text-xs text-slate-400">GPMS — جامعة حفر الباطن</p>
        </section>
      </div>
    </main>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/gpms-i18n-extra.js"></script>
    <script src="js/gpms-i18n.js"></script>
    <script src="js/gpms-config.js"></script>
    <script src="js/GPMS.js"></script>
    <script src="js/gpms-lang-toggle.js"></script>
    <script src="js/gpms-page-i18n.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const API = window.GPMS_CONFIG?.apiBaseUrl || "http://localhost:8000/api/v1";
        const form = document.getElementById("changePasswordForm");
        const alertBox = document.getElementById("cpAlert");
        const btn = document.getElementById("cpSubmit");

        function authHeaders() {
          const s = getSession() || {};
          return {
            Authorization: `Bearer ${s.accessToken || ""}`,
            "Content-Type": "application/json",
          };
        }

        function showAlert(msg) {
          alertBox.textContent = msg;
          alertBox.classList.remove("hidden");
        }
        function hideAlert() {
          alertBox.textContent = "";
          alertBox.classList.add("hidden");
        }

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          hideAlert();
          const cur = document.getElementById("currentPassword").value;
          const nu = document.getElementById("newPassword").value;
          const cf = document.getElementById("confirmPassword").value;
          if (nu.length < 6) {
            showAlert("كلمة المرور الجديدة يجب أن لا تقل عن 6 أحرف.");
            return;
          }
          if (nu !== cf) {
            showAlert("تأكيد كلمة المرور غير متطابق.");
            return;
          }
          btn.disabled = true;
          btn.textContent = "جاري الحفظ…";
          try {
            const r = await fetch(`${API}/auth/change-password`, {
              method: "PATCH",
              headers: authHeaders(),
              body: JSON.stringify({ current_password: cur, new_password: nu }),
            });
            const data = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(data.detail || "تعذر التحديث");
            const prev = getSession() || {};
            setSession({
              ...prev,
              accessToken: data.access_token || prev.accessToken,
              mustChangePassword: false,
            });
            const role = prev.role || "student";
            const dash =
              role === "student"
                ? "./student_dashboard.html"
                : role === "supervisor"
                  ? "./supervisor_dashboard.html"
                  : "./admin_dashboard.html";
            window.location.href = dash;
          } catch (err) {
            showAlert(err.message || "حدث خطأ");
          } finally {
            btn.disabled = false;
            btn.textContent = "حفظ ومتابعة";
          }
        });
        if (window.lucide) lucide.createIcons();
      });
    </script>
  </body>
</html>
