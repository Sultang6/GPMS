<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script>
      (function () {
        function gpmsPublicBase() {
          if (location.protocol === "file:") {
            var u = location.href.split("#")[0].split("?")[0];
            var i = u.toLowerCase().indexOf("/pages/");
            if (i >= 0) return u.slice(0, i + 1);
            return u.slice(0, u.lastIndexOf("/") + 1);
          }
          var p = location.pathname.replace(/\\/g, "/");
          var idx = p.indexOf("/pages/");
          if (idx >= 0) return p.slice(0, idx + 1);
          var slash = p.lastIndexOf("/");
          return slash >= 0 ? p.slice(0, slash + 1) : "/";
        }
        window.gpmsPublicBase = gpmsPublicBase;
        var base = document.createElement("base");
        base.href = gpmsPublicBase();
        document.head.appendChild(base);
      })();
    </script>

              <div id="chatThread" class="h-[52vh] overflow-y-auto bg-slate-50 px-5 py-5 sm:h-[58vh]">

                  </div>

              </div>

              <div class="border-t border-slate-200 bg-white p-4">

                  <input id="chatInput" class="gpms-input" placeholder="اكتب رسالتك هنا..." required />

                    <span class="inline-flex items-center gap-2">

              </div>

              </div>

          </section>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/gpms-i18n-extra.js"></script>
    <script src="js/gpms-i18n.js"></script>
    <script src="js/gpms-config.js"></script>
    <script src="js/GPMS.js"></script>
    <script src="js/gpms-lang-toggle.js"></script>
    <script src="js/gpms-page-i18n.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const API = window.GPMS_CONFIG?.apiBaseUrl || "http://localhost:8000/api/v1";
        const session = (() => {
          try { return JSON.parse(localStorage.getItem("gpms_session_v1")); } catch { return null; }
        })();
        const token = session?.accessToken || "";
        const userId = session?.userId;
        const authHeaders = { Authorization: `Bearer ${token}` };

        const projectSelect = document.getElementById("projectSelect");
        const chatMessages = document.getElementById("chatMessages");
        const chatForm = document.getElementById("chatForm");
        const chatInput = document.getElementById("chatInput");
        const sendBtn = document.getElementById("sendBtn");
        const chatTitle = document.getElementById("chatTitle");
        const chatSubtitle = document.getElementById("chatSubtitle");

        let currentProjectId = null;
        let pollInterval = null;

        async function loadProjects() {
          try {
            const resp = await fetch(`${API}/projects`, { headers: authHeaders });
            if (!resp.ok) return;
            const projects = await resp.json();
            projects.forEach((p) => {
              const opt = document.createElement("option");
              opt.value = p.project_id;
              opt.textContent = p.title;
              projectSelect.appendChild(opt);
            });
          } catch {}
        }

        function esc(v) {
          return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        async function loadMessages(projectId) {
          try {
            const resp = await fetch(`${API}/messages?project_id=${projectId}`, { headers: authHeaders });
            if (!resp.ok) return;
            const msgs = await resp.json();

            chatMessages.innerHTML = "";
            if (msgs.length === 0) {
              chatMessages.innerHTML = '<div class="flex items-center justify-center h-full"><p class="text-sm text-slate-400">لا توجد رسائل بعد. ابدأ المحادثة!</p></div>';
              return;
            }

            msgs.forEach((m) => {
              const isMe = m.sender_id === userId;
              const time = new Date(m.sent_at).toLocaleTimeString("ar-SA", { hour: "2-digit", minute: "2-digit" });
              const row = document.createElement("div");
              row.className = `flex ${isMe ? "justify-end" : "justify-start"}`;
              row.innerHTML = `
                <div class="gpms-chat-bubble ${isMe ? "gpms-chat-bubble--me" : "gpms-chat-bubble--other"}">
                  <div class="text-xs ${isMe ? "font-extrabold text-white/80" : "font-bold text-slate-500"}">${isMe ? "أنت" : "عضو #" + m.sender_id} — ${time}</div>
                  <div class="mt-1">${esc(m.content)}</div>
                </div>
              `;
              chatMessages.appendChild(row);
            });

            const thread = document.getElementById("chatThread");
            thread.scrollTop = thread.scrollHeight;
          } catch {}
        }

        projectSelect.addEventListener("change", () => {
          const val = projectSelect.value;
          if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

          if (!val) {
            currentProjectId = null;
            sendBtn.disabled = true;
            chatMessages.innerHTML = '<div class="flex items-center justify-center h-full"><p class="text-sm text-slate-400">اختر مشروع من القائمة لعرض المحادثة</p></div>';
            chatTitle.textContent = "محادثة المشروع";
            chatSubtitle.textContent = "اختر مشروع لعرض المحادثة";
            return;
          }

          currentProjectId = Number(val);
          sendBtn.disabled = false;
          const selectedText = projectSelect.options[projectSelect.selectedIndex].textContent;
          chatTitle.textContent = selectedText;
          chatSubtitle.textContent = "محادثة جماعية";
          loadMessages(currentProjectId);
          pollInterval = setInterval(() => loadMessages(currentProjectId), 5000);
        });

        chatForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          const content = chatInput.value.trim();
          if (!content || !currentProjectId) return;

          chatInput.value = "";
          sendBtn.disabled = true;

          try {
            const resp = await fetch(`${API}/messages`, {
              method: "POST",
              headers: { ...authHeaders, "Content-Type": "application/json" },
              body: JSON.stringify({
                sender_id: userId,
                project_id: currentProjectId,
                content: content,
              }),
            });
            if (!resp.ok) {
              const err = await resp.json().catch(() => ({}));
              alert(err.detail || "فشل إرسال الرسالة");
            }
            await loadMessages(currentProjectId);
          } catch {
            alert("تعذر الاتصال بالخادم");
          } finally {
            sendBtn.disabled = false;
            chatInput.focus();
          }
        });

        loadProjects();
      });
    </script>
  </body>
</html>
